<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dice Generator</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#7b2ff7,#f107a3);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
text-align:center;
margin:0;
}

.container{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
width:320px;
}

h1{
margin-top:0;
}

.dice{
width:120px;
height:120px;
background:white;
color:black;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
border-radius:20px;
margin:20px auto;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
transition:transform 0.8s;
}

.roll{
transform:rotateX(720deg) rotateY(720deg);
}

input{
width:100%;
padding:8px;
border-radius:10px;
border:none;
margin-bottom:10px;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
font-weight:bold;
}

.rollBtn{
background:#ffcc00;
}

.preset{
background:#444;
color:white;
}

.github{
margin-top:15px;
display:inline-block;
background:black;
padding:10px 14px;
border-radius:10px;
text-decoration:none;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>🎲 Dice Generator</h1>

<p>Para Ludo, Stop, juegos de mesa o retos</p>

<input id="facesInput" value="1,2,3,4,5,6">

<div>
<button class="preset" onclick="setNumbers()">Números</button>
<button class="preset" onclick="setLetters()">Letras</button>
<button class="preset" onclick="setCouple()">Parejas</button>
</div>

<div id="dice" class="dice">?</div>

<button class="rollBtn" onclick="rollDice()">🎲 Tirar</button>

<br>

<a class="github" href="https://github.com/cr1085" target="_blank">
⭐ Sígueme en GitHub
</a>

</div>

<script>

let faces=["1","2","3","4","5","6"]

function updateFaces(){
let input=document.getElementById("facesInput").value
faces=input.split(",").map(v=>v.trim()).filter(v=>v)
}

function rollDice(){

updateFaces()

let dice=document.getElementById("dice")

dice.classList.add("roll")

setTimeout(()=>{

let result=faces[Math.floor(Math.random()*faces.length)]

dice.innerText=result

dice.classList.remove("roll")

},800)

}

function setNumbers(){

faces=["1","2","3","4","5","6"]

document.getElementById("facesInput").value=faces.join(",")

}

function setLetters(){

faces=["A","B","C","D","E","F"]

document.getElementById("facesInput").value=faces.join(",")

}

function setCouple(){

faces=["BESO","ABRAZO","RETO","VERDAD","MASAJE","SHOT"]

document.getElementById("facesInput").value=faces.join(",")

}

</script>

</body>
</html>
